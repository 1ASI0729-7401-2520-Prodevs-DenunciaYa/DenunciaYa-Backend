environment.name = prod

spring.datasource.url=jdbc:mysql://${DATABASE_URL}:3306/${DATABASE_NAME}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=com.denunciayabackend.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.security.user.name=admin
spring.security.user.password=admin123
authorization.jwt.secret=MySuperSecretKeyChangeThisKeyThatHasAtLeast32Chars
authorization.jwt.expiration.days=7
spring.crac.enabled=false
stripe.secret.key=TU_CLAVE_SECRETA_DE_STRIPE

documentation.application.title=DenunciaYa API
documentation.application.description=API REST para la gesti¾n de denuncias y comunidad
documentation.application.version=1.0.0
documentation.application.contact.name=Equipo DenunciaYa
documentation.application.contact.email=soporte@denunciaya.com
documentation.application.contact.url=https://denunciaya.com
